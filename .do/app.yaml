alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED
features:
  - buildpack-stack=ubuntu-22
ingress:
  rules:
    - component:
        name: class-war-international-host
      match:
        authority:
          exact: ""
        path:
          prefix: /
name: class-war-international
region: sfo
services:
  - environment_slug: node-js
    github:
      branch: main
      repo: jeffmay/class-war-international
      deploy_on_push: false
    http_port: 8000
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    name: class-war-international-host
    build_command: npm install
    run_command: npm install tsx && npm start
    source_dir: server

name: Validate Cards

on:
  push:
    paths:
      - "docs/cards.tsv"
      - "scripts/generate-cards.ts"
      - "web/src/data/cards.ts"
  pull_request:
    paths:
      - "docs/cards.tsv"
      - "scripts/generate-cards.ts"
      - "web/src/data/cards.ts"

jobs:
  validate:
    name: Generate & Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate src/data/cards.ts from docs/cards.tsv
        run: npm run generate

      - name: Fail if generated file differs from committed file
        run: |
          if ! git diff --exit-code src/data/cards.ts; then
            echo "::error file=src/data/cards.ts::Generated cards.ts differs from committed version. Run 'npm run generate' and commit the result."
            exit 1
          fi

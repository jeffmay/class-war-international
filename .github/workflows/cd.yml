# Continuous deploys (CD) the API to production upon merge to main branch.
name: Deploy Main Branch

on:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  deploy-api-prod:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Deploy the app
        uses: digitalocean/app_action/deploy@v2
        with:
          token: ${{ secrets.DO_API_TOKEN_DEPLOY_PROD }}
